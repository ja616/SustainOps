services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: sustainiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sustainiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sustainiq -d sustainiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sustainiq:password@db:5432/sustainiq_db
      - SECRET_KEY=sustainiq_super_secret_key
      - JWT_SECRET=sustainiq_super_secret_key
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=amazon.nova-lite-v1:0
      - PYTHONPATH=/app:/agents
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./agents:/agents
      - ./mcp_servers:/mcp_servers

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
